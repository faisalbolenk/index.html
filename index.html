<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Storan Pro</title>
    <style>
        /* Desain Latar & Font */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #f7f7f7; 
            display: flex;
            justify-content: center;
            height: 100vh;
            align-items: flex-end; 
        }
        
        .calc-container { 
            width: 100%;
            max-width: 420px;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            background: #f7f7f7;
        }

        /* Area Layar Angka */
        .display-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px 25px;
            position: relative;
        }
        
        .top-bar {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #555;
        }
        
        .mode-title { font-weight: 600; font-size: 16px; color: #333; }
        .entry-counter { color: #ff7b00; font-weight: bold; font-size: 13px; background: #fff3e0; padding: 4px 8px; border-radius: 8px;}

        /* Riwayat Grand Total (=) di Atas */
        .grand-total-display {
            font-size: 18px;
            color: #10b981; 
            text-align: right;
            margin-bottom: 8px;
            font-weight: 700;
            overflow-x: auto;
            white-space: nowrap;
            min-height: 22px;
        }
        .grand-total-display::-webkit-scrollbar { display: none; }

        /* Riwayat Angka yang Sedang Diketik */
        .history-preview { 
            font-size: 15px; 
            color: #888; 
            text-align: right; 
            min-height: 20px;
            margin-bottom: 5px;
            overflow-x: auto;
            white-space: nowrap;
        }
        .history-preview::-webkit-scrollbar { display: none; }
        
        .display { 
            width: 100%; 
            background: transparent;
            border: none;
            text-align: right; 
            font-size: 55px; 
            font-weight: 400;
            color: #000000; 
            padding: 0;
            margin: 0;
            outline: none;
            overflow-x: auto;
        }
        .display::-webkit-scrollbar { display: none; }

        /* Area Keypad */
        .keypad-container {
            padding: 10px 15px 25px 15px;
            background: #ffffff;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.03);
        }

        /* Desain Tombol Standar */
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        
        button { 
            background: #f4f5f7; 
            border: none; 
            border-radius: 16px; 
            font-size: 24px; 
            font-weight: 500;
            color: #111;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1; 
            transition: 0.1s;
        }
        button:active { background: #e2e4e9; transform: scale(0.96); }
        
        .text-orange { color: #ff7b00; }
        .bg-orange { background: #ff7b00; color: #ffffff; font-weight: 600; font-size: 30px; box-shadow: 0 4px 10px rgba(255, 123, 0, 0.2);}
        .bg-orange:active { background: #e66e00; }
        .btn-action-sm { font-size: 18px; font-weight: 600; } 

        /* Layout Mode Storan */
        #custom-mode { display: flex; flex-direction: column; gap: 8px;}
        
        /* Baris Hapus, Gabung, & Salin */
        .action-row-top { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .btn-top { aspect-ratio: auto; height: 42px; font-size: 15px; border-radius: 10px; font-weight: 600; background: #fff0e6; color: #ff7b00;}
        .btn-top-alt { background: #eff6ff; color: #3b82f6; } 
        
        /* Baris Mode, AC, Sama Dengan (=) */
        .action-row-mid { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 8px; margin-bottom: 2px;}
        .btn-mid { aspect-ratio: auto; height: 48px; font-size: 16px; border-radius: 12px; font-weight: bold; }
        .btn-switch { background: #f3f4f6; color: #4b5563; }
        .btn-ac { background: #fee2e2; color: #ef4444; }

        /* Area Hitung Cepat */
        .fast-calc-area {
            display: flex;
            flex-direction: column;
            gap: 4px; 
            background: #fdfdfd;
            border-radius: 16px;
            padding: 4px;
            border: 1px solid #f0f0f0;
        }

        /* Modifiers (-1 s/d -25) */
        .modifier-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .btn-mod { aspect-ratio: auto; height: 42px; font-size: 14px; border-radius: 8px; font-weight: 600; background: #f4f5f7;}
        .mod-minus { color: #e11d48; }
        .mod-plus { color: #10b981; }

        /* Tombol 4x3 Storan (Tombol Besar) */
        .grid-custom-large { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-storan { aspect-ratio: auto; height: 60px; font-size: 24px; font-weight: 600; background: #f4f5f7; border-radius: 12px;}
        .btn-hero { background: #ff7b00; color: #fff; font-size: 32px; box-shadow: 0 4px 10px rgba(255,123,0,0.3);}
        .btn-hero:active { background: #e66e00; }
    </style>
</head>
<body>

    <div class="calc-container" id="app">
        
        <div class="display-container">
            <div class="top-bar">
                <div class="mode-title" id="mode-title">Mode Storan</div>
                <div class="entry-counter" id="entry-counter">Data: 0</div>
            </div>
            
            <div class="grand-total-display" id="grand-total-display"></div>
            <div class="history-preview" id="history-preview"></div>
            <div class="display" id="display">0</div>
        </div>

        <div class="keypad-container">
            
            <div id="standard-mode" style="display: none;">
                <div class="btn-grid">
                    <button class="btn-action-sm text-orange" onclick="handleClear()">AC</button>
                    <button class="text-orange" onclick="handleBackspace()">⌫</button>
                    <button class="btn-action-sm text-orange" onclick="appendStd('%')">%</button>
                    <button class="text-orange" onclick="appendStd('/')">÷</button>
                    
                    <button onclick="appendStd('7')">7</button>
                    <button onclick="appendStd('8')">8</button>
                    <button onclick="appendStd('9')">9</button>
                    <button class="text-orange" onclick="appendStd('*')">×</button>
                    
                    <button onclick="appendStd('4')">4</button>
                    <button onclick="appendStd('5')">5</button>
                    <button onclick="appendStd('6')">6</button>
                    <button class="text-orange" onclick="appendStd('-')">-</button>
                    
                    <button onclick="appendStd('1')">1</button>
                    <button onclick="appendStd('2')">2</button>
                    <button onclick="appendStd('3')">3</button>
                    <button class="text-orange" onclick="appendStd('+')">+</button>
                    
                    <button class="text-orange btn-action-sm" style="background:#f3f4f6; color:#4b5563;" onclick="toggleMode()">🔄 Mode</button>
                    <button onclick="appendStd('0')">0</button>
                    <button onclick="appendStd('.')">,</button>
                    <button class="bg-orange" onclick="calculateStd()">=</button>
                </div>
            </div>

            <div id="custom-mode">
                
                <div class="action-row-top">
                    <button class="btn-top" onclick="handleBackspace()">⌫ Hapus</button>
                    <button class="btn-top btn-top-alt" onclick="handleGabung()">🔗 Gabung</button>
                    <button class="btn-top" onclick="copyResult()">📋 Salin</button>
                </div>

                <div class="action-row-mid">
                    <button class="btn-mid btn-switch" onclick="toggleMode()">🔄 Mode</button>
                    <button class="btn-mid btn-ac" onclick="handleClear()">AC</button>
                    <button class="btn-mid bg-orange" onclick="commitToGrandTotal()">= Simpan</button>
                </div>

                <div class="fast-calc-area">
                    
                    <div class="modifier-row">
                        <button class="btn-mod mod-minus" onclick="pressSmallBtn(-1)">-1</button>
                        <button class="btn-mod mod-minus" onclick="pressSmallBtn(-5)">-5</button>
                        <button class="btn-mod mod-minus" onclick="pressSmallBtn(-10)">-10</button>
                        <button class="btn-mod mod-minus" onclick="pressSmallBtn(-15)">-15</button>
                        <button class="btn-mod mod-minus" onclick="pressSmallBtn(-20)">-20</button>
                        <button class="btn-mod mod-minus" onclick="pressSmallBtn(-25)">-25</button>
                    </div>

                    <div class="modifier-row">
                        <button class="btn-mod mod-plus" onclick="pressSmallBtn(1)">+1</button>
                        <button class="btn-mod mod-plus" onclick="pressSmallBtn(5)">+5</button>
                        <button class="btn-mod mod-plus" onclick="pressSmallBtn(10)">+10</button>
                        <button class="btn-mod mod-plus" onclick="pressSmallBtn(15)">+15</button>
                        <button class="btn-mod mod-plus" onclick="pressSmallBtn(20)">+20</button>
                        <button class="btn-mod mod-plus" onclick="pressSmallBtn(25)">+25</button>
                    </div>

                    <div class="grid-custom-large">
                        <button class="btn-storan" onclick="pressLargeBtn(30)">30</button>
                        <button class="btn-storan" onclick="pressLargeBtn(50)">50</button>
                        <button class="btn-storan" onclick="pressLargeBtn(52)">52</button>
                        
                        <button class="btn-storan" onclick="pressLargeBtn(80)">80</button>
                        <button class="btn-storan btn-hero" onclick="pressLargeBtn(65)">65</button>
                        <button class="btn-storan" onclick="pressLargeBtn(100)">100</button>
                        
                        <button class="btn-storan" onclick="pressLargeBtn(104)">104</button>
                        <button class="btn-storan" onclick="pressLargeBtn(130)">130</button>
                        <button class="btn-storan" onclick="pressLargeBtn(150)">150</button>

                        <button class="btn-storan" onclick="pressLargeBtn(195)">195</button>
                        <button class="btn-storan" onclick="pressLargeBtn(260)">260</button>
                        <button class="btn-storan" onclick="pressLargeBtn(390)">390</button>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <script>
        let isCustomMode = true;
        
        let totalSum = 0;
        let currentInput = null; 
        let customLogs = [];

        let grandTotal = 0;
        let grandHistory = [];

        const displayEl = document.getElementById('display');
        const previewEl = document.getElementById('history-preview');
        const counterEl = document.getElementById('entry-counter');
        const titleEl = document.getElementById('mode-title');
        const grandTotalEl = document.getElementById('grand-total-display');

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
        }

        function pressLargeBtn(val) {
            if (currentInput !== null) {
                totalSum += currentInput;
                customLogs.push(currentInput);
            }
            currentInput = val;
            updateCustomDisplay();
        }

        function pressSmallBtn(modifier) {
            if (currentInput === null) currentInput = 0;
            currentInput += modifier;
            updateCustomDisplay();
        }

        function updateCustomDisplay() {
            let activeNum = currentInput !== null ? currentInput : 0;
            let displayValue = totalSum + activeNum;
            
            displayEl.innerText = formatNumber(displayValue);

            let tempLogs = [...customLogs];
            if (currentInput !== null) tempLogs.push(currentInput); 
            
            counterEl.innerText = "Data: " + tempLogs.length;

            if (tempLogs.length > 0) {
                previewEl.innerText = tempLogs.join(" + ");
            } else {
                previewEl.innerText = "";
            }
            
            if (grandHistory.length > 0) {
                grandTotalEl.innerHTML = grandHistory.map(formatNumber).join(' + ') + ` = <span style="color:#ff7b00">${formatNumber(grandTotal)}</span>`;
            } else {
                grandTotalEl.innerHTML = "";
            }

            displayEl.scrollLeft = displayEl.scrollWidth;
            previewEl.scrollLeft = previewEl.scrollWidth;
            grandTotalEl.scrollLeft = grandTotalEl.scrollWidth;
        }

        // FUNGSI GABUNG (MERGE) 2 ANGKA TERAKHIR
        function handleGabung() {
            if (!isCustomMode) return;

            if (currentInput !== null) {
                if (customLogs.length > 0) {
                    let prevNum = customLogs.pop();
                    totalSum -= prevNum;
                    currentInput += prevNum;
                    updateCustomDisplay();
                }
            } else {
                if (customLogs.length >= 2) {
                    let lastNum1 = customLogs.pop();
                    let lastNum2 = customLogs.pop();
                    totalSum -= (lastNum1 + lastNum2);
                    currentInput = lastNum1 + lastNum2;
                    updateCustomDisplay();
                }
            }
        }

        function commitToGrandTotal() {
            let activeNum = currentInput !== null ? currentInput : 0;
            let currentDisplayValue = totalSum + activeNum;

            if (currentDisplayValue === 0 && customLogs.length === 0) return;

            grandHistory.push(currentDisplayValue);
            grandTotal += currentDisplayValue;

            totalSum = 0;
            currentInput = null;
            customLogs = [];
            
            updateCustomDisplay();
        }

        let stdExpression = "";
        function appendStd(val) {
            if (displayEl.innerText === "0" || displayEl.innerText === "Error") stdExpression = "";
            
            let viewVal = val;
            if(val === '*') viewVal = '×';
            if(val === '/') viewVal = '÷';
            
            stdExpression += val;
            displayEl.innerText = stdExpression.replace(/\*/g, '×').replace(/\//g, '÷');
            displayEl.scrollLeft = displayEl.scrollWidth;
        }

        function calculateStd() {
            try {
                if(!stdExpression) return;
                let result = eval(stdExpression);
                if(result.toString().length > 10) result = parseFloat(result.toFixed(5));
                
                displayEl.innerText = formatNumber(result);
                stdExpression = result.toString();
            } catch(e) {
                displayEl.innerText = "Error";
                stdExpression = "";
            }
        }

        function handleBackspace() {
            if (isCustomMode) {
                if (currentInput !== null) {
                    let str = currentInput.toString();
                    if (str.length > 1 && !(str.length === 2 && str.startsWith('-'))) {
                        currentInput = parseInt(str.slice(0, -1));
                    } else {
                        currentInput = null;
                    }
                    updateCustomDisplay();
                } else if (customLogs.length > 0) {
                    currentInput = customLogs.pop();
                    totalSum -= currentInput;
                    updateCustomDisplay();
                } else if (grandHistory.length > 0 && totalSum === 0 && currentInput === null) {
                    let removed = grandHistory.pop();
                    grandTotal -= removed;
                    updateCustomDisplay();
                }
            } else {
                if (stdExpression.length > 0) {
                    stdExpression = stdExpression.slice(0, -1);
                    displayEl.innerText = stdExpression.replace(/\*/g, '×').replace(/\//g, '÷') || "0";
                }
            }
        }

        function handleClear() {
            if (isCustomMode) {
                if (totalSum === 0 && currentInput === null && customLogs.length === 0) {
                    grandTotal = 0;
                    grandHistory = [];
                }
                totalSum = 0; 
                currentInput = null; 
                customLogs = [];
                updateCustomDisplay();
            } else {
                stdExpression = "";
                displayEl.innerText = "0";
                previewEl.innerText = "";
            }
        }

        function copyResult() {
            let textToCopy = grandTotal > 0 && totalSum === 0 && currentInput === null 
                ? grandTotal.toString() 
                : displayEl.innerText.replace(/\./g, ""); 
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Berhasil menyalin angka: " + formatNumber(textToCopy));
            });
        }

        function toggleMode() {
            isCustomMode = !isCustomMode;
            document.getElementById('custom-mode').style.display = isCustomMode ? 'flex' : 'none';
            document.getElementById('standard-mode').style.display = isCustomMode ? 'none' : 'block';
            
            titleEl.innerText = isCustomMode ? 'Mode Storan' : 'Kalkulator Biasa';
            counterEl.style.display = isCustomMode ? 'block' : 'none'; 
            grandTotalEl.style.display = isCustomMode ? 'block' : 'none';
            
            handleClear(); 
        }
    </script>
</body>
</html>
