<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kalkulator Pati 5</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        
        /* GAYA UNTUK TAB (MENU ATAS) */
        .tab-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.95em; cursor: pointer; background: #ddd; color: #555; transition: 0.2s; }
        .tab-btn.active { background: #007bff; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* GAYA UMUM KALKULATOR */
        .date-badge { background: #17a2b8; color: white; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; font-size: 0.95em; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #007bff; border-bottom: 2px solid #eee; padding-bottom: 5px; font-size: 1.1em; display: flex; justify-content: space-between; align-items: center; }
        .auto-save-status { font-size: 0.65em; color: #28a745; font-weight: normal; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-top: 8px; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 4px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 1em; }
        .btn-container { display: flex; justify-content: center; margin-top: 15px; gap: 10px; }
        .btn-hapus { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 0.9em; cursor: pointer; color: white; background: #dc3545; }

        /* GAYA KHUSUS REKAP */
        .res-box { padding: 8px; margin-top: 8px; border-radius: 8px; background: #e7f3ff; border-left: 4px solid #28a745; font-size: 0.85em; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8em; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        th { background: #f8f9fa; color: #333; }
        .hasil-cell { background: #fdfdfd; font-size: 0.9em; line-height: 1.4; color: #333; }
        .label-cell { font-weight: bold; color: #555; text-align: left; }

        /* GAYA KHUSUS STORAN */
        .result-box { padding: 12px; margin-top: 10px; border-radius: 8px; text-align: center; font-weight: bold; color: white; font-size: 1em; }
        .bg-storan { background-color: #007bff; }
        .bg-persen { background-color: #28a745; }
        .bg-final { background-color: #dc3545; }
        .footer { text-align: center; font-size: 0.8em; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="tab-container">
        <button class="tab-btn active" onclick="bukaTab(event, 'menu-rekap')">📝 Kalkulator Rekap</button>
        <button class="tab-btn" onclick="bukaTab(event, 'menu-storan')">💰 Kalkulator Storan</button>
    </div>

    <div class="date-badge" id="tanggal-hari-ini">Memuat tanggal...</div>

    <div id="menu-rekap" class="tab-content active">
        <div class="card">
            <h3>
                <span>1. Kalkulator Rekap</span>
                <span class="auto-save-status">✅ Auto-Save Aktif</span>
            </h3>
            <label>Drop:</label>
            <input type="number" id="d1" oninput="hitungRekap()" placeholder="Isi Drop">
            <label>Jml Drop lalu:</label>
            <input type="number" id="d2" oninput="hitungRekap()" placeholder="Isi Jml Drop lalu">
            <div class="res-box" id="hDrop">Jml Drop : 0</div>

            <label>Storting:</label>
            <input type="number" id="s1" oninput="hitungRekap()" placeholder="Isi Storting">
            <label>Jml Storting lalu:</label>
            <input type="number" id="s2" oninput="hitungRekap()" placeholder="Isi Jml Storting lalu">
            <div class="res-box" id="hStort">Jml Storting : 0</div>

            <label>Sirkulasi (Drop*1.3 - Stort + Sirk):</label>
            <input type="number" id="drRec" oninput="hitungRekap()" placeholder="Drop (otomatis)">
            <input type="number" id="stRec" oninput="hitungRekap()" placeholder="Stort (otomatis)">
            <input type="number" id="siRec" oninput="hitungRekap()" placeholder="Isi Sirkulasi lalu">
            <div class="res-box" id="hSirkulasi">Saldo Sirkulasi : 0</div>
        </div>

        <div class="card">
            <h3>2. Kalkulator CM, MB, ML</h3>
            <table>
                <tr><th>Data</th><th>CM</th><th>MB</th><th>ML</th></tr>
                <tr><td class="label-cell">Angsuran</td>
                    <td><input type="number" id="a1" oninput="hitungRekap()"></td>
                    <td><input type="number" id="a2" oninput="hitungRekap()"></td>
                    <td><input type="number" id="a3" oninput="hitungRekap()"></td>
                </tr>
                <tr><td class="label-cell">Jmlh lalu</td>
                    <td><input type="number" id="j1" oninput="hitungRekap()"></td>
                    <td><input type="number" id="j2" oninput="hitungRekap()"></td>
                    <td><input type="number" id="j3" oninput="hitungRekap()"></td>
                </tr>
                <tr><td class="label-cell">Sldo lalu</td>
                    <td><input type="number" id="sa1" oninput="hitungRekap()"></td>
                    <td><input type="number" id="sa2" oninput="hitungRekap()"></td>
                    <td><input type="number" id="sa3" oninput="hitungRekap()"></td>
                </tr>
                <tr><td class="label-cell">Program</td>
                    <td><input type="number" id="p1" oninput="hitungRekap()"></td>
                    <td><input type="number" id="p2" oninput="hitungRekap()"></td>
                    <td>-</td>
                </tr>
                <tr><td class="label-cell"><b>Hasil</b></td>
                    <td class="hasil-cell" id="res1">-</td>
                    <td class="hasil-cell" id="res2">-</td>
                    <td class="hasil-cell" id="res3">-</td>
                </tr>
            </table>
            <div class="btn-container">
                <button class="btn-hapus" onclick="hapusData('rekap')">🗑️ Kosongkan Data Rekap</button>
            </div>
        </div>
    </div>

    <div id="menu-storan" class="tab-content">
        <div class="card">
            <h3>
                <span>💰 Kalkulator Storan</span>
                <span class="auto-save-status">✅ Auto-Save Aktif</span>
            </h3>
            
            <label>Drop:</label>
            <input type="number" id="st_drop" oninput="hitungStoran()" placeholder="0">
            
            <label>Kasbon:</label>
            <input type="number" id="st_kasbon" oninput="hitungStoran()" placeholder="0">
            
            <label>Storting:</label>
            <input type="number" id="st_storting" oninput="hitungStoran()" placeholder="0">
            
            <label>Transport:</label>
            <input type="number" id="st_transport" oninput="hitungStoran()" placeholder="0">
            
            <div class="result-box bg-storan" id="hasilStoran">Storan: 0</div>
            <div class="result-box bg-persen" id="hasil9persen">9% Drop: 0</div>
            <div class="result-box bg-final" id="hasilSelisih">Tunai: 0</div>

            <div class="btn-container">
                <button class="btn-hapus" onclick="hapusData('storan')">🗑️ Kosongkan Data Storan</button>
            </div>
        </div>
    </div>
    
    <div class="footer">Dibuat
